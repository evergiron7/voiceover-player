<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Media Solutions | Voice Over Demos</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="player">

    <img src="images/logo.png" class="logo">

    <h1>Voice Over Demos</h1>

    <h2 id="track-title">English Commercial Demo</h2>

    <audio id="audio"></audio>

    <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100">

    <div class="controls">

        <button id="prev">⏮</button>

        <button id="play">▶</button>

        <button id="next">⏭</button>

    </div>

    <div id="playlist"></div>

</div>

<script src="script.js"></script>

</body>
</html>
